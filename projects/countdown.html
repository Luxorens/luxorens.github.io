<!DOCTYPE html>
<html>
    <head>
        <title>Subnautica 2 Countdown</title>
    </head>
    <body>
        <style>
        @keyframes loadIntro {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        img {
            max-width: 20%; /* takes the 100 % width of its container (.box div)*/
            max-height: 20%; /* takes the 100 % height of its container (.box div)*/
            object-fit:cover;
        }
        body {
            background: url(bg2.jpg);
            
            color: #ffffff;
            justify-content: center;
            align-items: center;
            display: flex;
            vertical-align: middle;
            text-align: center;
            flex-direction: column;
            min-height: 100svh;
            overflow: hidden;

            font-family: "Sans Serif", monospace;
            font-width: 200%;

            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10 and IE 11 */
            user-select: none; /* Standard syntax */
        }
        @media (max-width:768px) {
        img {
            max-width: 50%; /* takes the 100 % width of its container (.box div)*/
            max-height: 50%; /* takes the 100 % height of its container (.box div)*/
            object-fit:cover;
        }
    }
        .zoopanimcountdown {
            animation: 2s ease-out 0s 1 loadIntro;
        }
        .zoopanimbutton {
            animation: 2.5s ease-out 0s 1 loadIntro;
        }

        .mainbutton {
            background-color: transparent;
            color:#ffffff;
            font-size: 20px;
            padding:5px 15px;
            font-family: "Sans Serif", monospace;
            font-width: 200%;
            border: 2px solid #ffffff;
            cursor:pointer;
            transition-duration: 0.4s;
            margin-top: -37px;
            text-decoration: none;
            text-decoration-color: #ffffff00;
        }
        .mainbutton:hover {
            padding:5px 25px;
            background-color: #ffffff27;
        }
        .maininput {
            background-color: transparent;
            color:#ffffff;
            font-size: 15px;
            padding:5px 30px;
            font-family: "Sans Serif", monospace;
            font-width: 200%;
            border: 2px solid #ffffff;
            transition-duration: 0.4s;
        }
        h1 {
            font-size: 70px;
        }
        .dimscreen {
            position:fixed;
            padding:0;
            margin:0;

            top:0;
            left:0;

            width: 100%;
            height: 100%;
            background:rgba(0, 0, 0, 0.5);
        }
        canvas {
            overflow-y: hidden;
            overflow-x: hidden;
            width: 100%;
            margin: 0;
        }
        .bgscreen {
            position: absolute;
        }
        </style>
        <div class="bgscreen">
            <p id="releasein" style="margin-bottom: -35px;">Subnautica 2 releases in:</p>
            <h1 id="nextsongcountdown"></h1>
            <center>
            <a target="_blank" href="https://store.steampowered.com/app/1962700/Subnautica_2/"><button id="button" style="display: none;" class="mainbutton">Play the game</button></a>
            </center>
        </div>
            <canvas id="canvas"></canvas>
            
    </body>

        <script>
    let W = window.innerWidth;
    let H = window.innerHeight;
    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");
    const maxConfettis = 300;
    const particles = [];

    const possibleColors = [
    "DodgerBlue",
    "OliveDrab",
    "Gold",
    "Pink",
    "SlateBlue",
    "LightBlue",
    "Gold",
    "Violet",
    "PaleGreen",
    "SteelBlue",
    "SandyBrown",
    "Chocolate",
    "Crimson"
    ];

    function randomFromTo(from, to) {
    return Math.floor(Math.random() * (to - from + 1) + from);
    }

    function confettiParticle() {
    this.x = Math.random() * W; // x
    this.y = Math.random() * H - H; // y
    this.r = randomFromTo(11, 33); // radius
    this.d = Math.random() * maxConfettis + 11;
    this.color =
        possibleColors[Math.floor(Math.random() * possibleColors.length)];
    this.tilt = Math.floor(Math.random() * 33) - 11;
    this.tiltAngleIncremental = Math.random() * 0.07 + 0.05;
    this.tiltAngle = 0;

    this.draw = function() {
        context.beginPath();
        context.lineWidth = this.r / 2;
        context.strokeStyle = this.color;
        context.moveTo(this.x + this.tilt + this.r / 3, this.y);
        context.lineTo(this.x + this.tilt, this.y + this.tilt + this.r / 5);
        return context.stroke();
    };
    }

    function Draw() {
    const results = [];

    // Magical recursive functional love
    requestAnimationFrame(Draw);

    context.clearRect(0, 0, W, window.innerHeight);

    for (var i = 0; i < maxConfettis; i++) {
        results.push(particles[i].draw());
    }

    let particle = {};
    let remainingFlakes = 0;
    for (var i = 0; i < maxConfettis; i++) {
        particle = particles[i];

        particle.tiltAngle += particle.tiltAngleIncremental;
        particle.y += (Math.cos(particle.d) + 3 + particle.r / 2) / 2;
        particle.tilt = Math.sin(particle.tiltAngle - i / 3) * 15;

        if (particle.y <= H) remainingFlakes++;

        // If a confetti has fluttered out of view,
        // bring it back to above the viewport and let if re-fall.
        if (particle.x > W + 30 || particle.x < -30 || particle.y > H) {
        particle.x = Math.random() * W;
        particle.y = -30;
        particle.tilt = Math.floor(Math.random() * 10) - 20;
        }
    }

    return results;
    }

    window.addEventListener(
    "resize",
    function() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    },
    false
    );

    // Push new confetti objects to `particles[]`
    for (var i = 0; i < maxConfettis; i++) {
    particles.push(new confettiParticle());
    }

    // Initialize
    canvas.width = W;
    canvas.height = H;






var countDownDate = new Date("May 14, 2026 17:00:00").getTime();

function updateCountdown() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  var el = document.getElementById("nextsongcountdown");
  var el2 = document.getElementById("releasein");
  var el3 = document.getElementById("button");

  if (distance <= 0) {
    el.innerHTML = "SUBNAUTICA 2 HAS BEEN RELEASED";
    el2.innerHTML = "The game is out!";
    el3.style.display = "block";
    Draw();
    clearInterval(x);
  } else {
    el.innerHTML = days + "d " + hours + "h " +
                   minutes + "m " + seconds + "s ";
  }
}

// run immediately
updateCountdown();

// then keep updating every second
var x = setInterval(updateCountdown, 1000);

document.getElementById('pear').ondragstart = function() { return false; };
        </script>
</html>
